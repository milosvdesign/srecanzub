document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 height:560px; background:radial-gradient(circle, rgba(18,179,168,.13), transparent 70%); border-radius:50%; pointer-events:none;\"><\u002Fdiv>\n    <div style=\"max-width:1080px; margin:0 auto; padding:0 32px; position:relative;\">\n      <div data-reveal=\"\" style=\"display:flex; align-items:center; gap:8px; font-size:14px; color:#8595A0; margin-bottom:22px;\"><a href=\"index.html\" style=\"color:#8595A0;\">Početna<\u002Fa><span>/<\u002Fspan><span style=\"color:#0E1B2A; font-weight:600;\">Cenovnik<\u002Fspan><\u002Fdiv>\n      <h1 data-reveal=\"\" data-delay=\"60\" style=\"font-family:'Sora'; font-weight:700; font-size:60px; line-height:1.04; letter-spacing:-0.03em; margin:0 0 20px; max-width:760px;\">Kompletan cenovnik usluga<\u002Fh1>\n      <p data-reveal=\"\" data-delay=\"120\" style=\"font-size:19px; line-height:1.6; color:#5A6B78; margin:0 0 8px; max-width:620px;\">Transparentne cene za sve naše usluge. Cene su okvirne i informativnog karaktera — konačan iznos utvrđuje se nakon pregleda i plana terapije.<\u002Fp>\n      <p data-reveal=\"\" data-delay=\"160\" style=\"font-size:14px; color:#8595A0; margin:0;\">Sve cene izražene su u dinarima (RSD). Poslednje ažuriranje: jul 2026.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PRICE TABLES -->\n  <section data-screen-label=\"Cene\" style=\"padding:20px 0 70px;\">\n    <div style=\"max-width:1080px; margin:0 auto; padding:0 32px; display:grid; gap:24px;\" data-tables=\"\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- NOTE -->\n  <section style=\"padding:0 0 70px;\">\n    <div style=\"max-width:1080px; margin:0 auto; padding:0 32px;\">\n      <div data-reveal=\"\" style=\"background:#F1FAF9; border:1px solid #DCEEEC; border-radius:24px; padding:32px 34px; display:flex; gap:18px; align-items:flex-start;\">\n        <span style=\"flex-shrink:0; width:46px; height:46px; border-radius:13px; background:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px -10px rgba(11,60,70,.4);\"> ro-alveolarni snimak', '1.000'],\n        ['Ortopan (panoramski) snimak', '2.500'],\n      ]},\n      { title: 'Konzervativa i endodoncija', icon: '<path d=\"M6 3.5C4.2 3.5 3 5 3 7c0 1.6.5 2.8.9 4.2.3 1 .5 2 .6 3.5.2 2.6.5 5.3 1.8 5.3 1.1 0 1.3-1.8 1.6-3.3.2-1 .4-1.7 1.1-1.7s.9.7 1.1 1.7c.3 1.5.5 3.3 1.6 3.3 1.3 0 1.6-2.7 1.8-5.3.1-1.5.3-2.5.6-3.5C20.5 9.8 21 8.6 21 7c0-2-1.2-3.5-3-3.5-1.3 0-2.2.6-3 .6s-1.7-.6-3-.6z\"/>', items: [\n        ['Beli (kompozitni) ispun', 'od 4.000'],\n        ['Estetski ispun prednjih zuba', 'od 5.500'],\n        ['Lečenje kanala (jednokanalni)', 'od 6.000'],\n        ['Lečenje kanala (višekanalni)', 'od 9.000'],\n      ]},\n      { title: 'Oralna hirurgija', icon: '<path d=\"M14 3l7 7-4 4-7-7zM10 7 3 14v7h7l7-7\"/>', items: [\n        ['Vađenje zuba', 'od 3.000'],\n        ['Hirurško vađenje', 'od 6.000'],\n        ['Vađenje umnjaka', 'od 8.000'],\n        ['Apikotomija', 'od 10.000'],\n      ]},\n      { title: 'Protetika', icon: '<path d=\"M6 3h12l-1 6H7zM7 9l1 12h8l1-12\"/>', items: [\n        ['Metalokeramička krunica', 'od 12.000'],\n        ['Bezmetalna (cirkon) krunica', 'od 22.000'],\n        ['Totalna proteza', 'od 35.000'],\n        ['Parcijalna proteza', 'od 28.000'],\n      ]},\n      { title: 'Implantologija', icon: '<path d=\"M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5l-8-3z\"/>', items: [\n        ['Zubni implant', 'od 45.000'],\n        ['Implant + suprastruktura', 'od 60.000'],\n        ['Krunica na implantu', 'od 25.000'],\n      ]},\n      { title: 'Estetska stomatologija', icon: '<path d=\"M12 3l2.4 5 5.6.6-4.2 3.7 1.3 5.5L12 20l-5.1 2.8 1.3-5.5L4 13.6 9.6 13z\"/>', items: [\n        ['Beljenje zuba (ordinacijsko)', 'od 18.000'],\n        ['Beljenje zuba (kućno)', 'od 12.000'],\n        ['Kompozitni vinir', 'od 9.000'],\n        ['Keramički vinir', 'od 26.000'],\n      ]},\n      { title: 'Parodontologija', icon: '<path d=\"M12 21s-7-4.5-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 11c0 5.5-7 10-7 10z\"/>', items: [\n        ['Uklanjanje kamenca (obe vilice)', 'od 3.500'],\n        ['Pjeskarenje zuba', 'od 3.000'],\n        ['Kiretaža po zubu', 'od 1.500'],\n      ]},\n      { title: 'Ortodoncija', icon: '<path d=\"M4 4h16v4H4zM8 8v3M16 8v3M12 8v5M6 13h12l-1 7H7z\"/>', items: [\n        ['Pokretni ortodontski aparat', 'od 25.000'],\n        ['Fiksni aparat (jedna vilica)', 'od 45.000'],\n        ['Ortodontska kontrola', 'od 1.500'],\n      ]},\n      { title: 'Dečija stomatologija', icon: '<circle cx=\"7\" cy=\"6\" r=\"2\"/><circle cx=\"17\" cy=\"6\" r=\"2\"/><circle cx=\"12\" cy=\"13\" r=\"7\"/><path d=\"M9.5 13h.01M14.5 13h.01M10 16a3 3 0 0 0 4 0\"/>', items: [\n        ['Pregled deteta', '1.500'],\n        ['Ispun mlečnog zuba', 'od 3.000'],\n        ['Zalivanje fisura (po zubu)', 'od 2.000'],\n        ['Fluorizacija', 'od 2.500'],\n      ]},\n    ];\n\n    const wrap = root.querySelector('[data-tables]');\n    groups.forEach((g, gi) => {\n      const card = document.createElement('div');\n      card.setAttribute('data-reveal', '');\n      card.setAttribute('data-delay', String((gi % 2) * 80));\n      card.style.cssText = 'background:#fff; border:1px solid #EDF3F5; border-radius:24px; padding:34px 36px;';\n      const rows = g.items.map(([n, p]) =>\n        '<div style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; padding:15px 0; border-bottom:1px solid #F0F5F6;\">' +\n          '<span style=\"font-size:15.5px; color:#3B4A57;\">' + n + '<\u002Fspan>' +\n          '<span style=\"font-family:\\'Sora\\'; font-weight:600; font-size:15.5px; white-space:nowrap;\">' + p + ' RSD<\u002Fspan>' +\n        '<\u002Fdiv>'\n      ).join('');\n      card.innerHTML =\n        '<div style=\"display:flex; align-items:center; gap:14px; margin-bottom:14px;\">' +\n          '<span style=\"width:50px; height:50px; border-radius:14px; background:#EAFAF7; display:flex; align-items:center; justify-content:center;\">' +\n            '<svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0B7E77\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">' + g.icon + '<\u002Fsvg>' +\n          '<\u002Fspan>' +\n          '<h2 style=\"font-family:\\'Sora\\'; font-weight:700; font-size:24px; letter-spacing:-0.02em; margin:0;\">' + g.title + '<\u002Fh2>' +\n        '<\u002Fdiv>' +\n        '<div style=\"margin-top:6px;\">' + rows + '<\u002Fdiv>';\n      // remove last border\n      const lastRow = card.querySelector('div:last-child > div:last-child');\n      if (lastRow) lastRow.style.borderBottom = 'none';\n      wrap.appendChild(card);\n    });\n\n    // Reveal\n    const revs = root.querySelectorAll('[data-reveal]');\n    revs.forEach(el => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(26px)';\n      el.style.transition = 'opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1)';\n    });\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          const d = parseInt(e.target.getAttribute('data-delay') || '0', 10);\n          setTimeout(() => { e.target.style.opacity = '1'; e.target.style.transform = 'none'; }, d);\n          io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.1, rootMargin: '0px 0px -6% 0px' });\n    revs.forEach(el => io.observe(el));\n\n    // Responsive: tables 2-col on wide\n    const applyResp = () => {\n      wrap.style.gridTemplateColumns = window.innerWidth < 820 ? '1fr' : '1fr 1fr';\n    };\n    applyResp();\n    window.addEventListener('resize', applyResp);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
